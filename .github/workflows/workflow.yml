name: CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 .

    - name: Run unit tests with nose
      run: |
        pip install nose
        nosetests
